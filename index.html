<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Estudiantes</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f4f8;
    margin: 0;
}

header {
    background: #0d47a1;
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 15px;
}

header img {
    height: 60px;
}

header h1 {
    margin: 0;
}

main {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.buscador {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card h2 {
    margin-top: 0;
    color: #0d47a1;
}

.item {
    margin: 6px 0;
}

.icon {
    margin-right: 6px;
    color: #0d47a1;
}

.badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 13px;
    color: white;
}

.si { background: green; }
.no { background: gray; }

.alerta {
    background: red;
}

</style>
</head>

<body>

<header>
    <img src="escudo.png">
    <h1>Liceo de Tarrazú</h1>
</header>

<main>

<div class="buscador">
    <input type="text" id="busqueda" placeholder="Buscar estudiante por nombre o cédula...">
</div>

<div class="grid" id="resultados"></div>

</main>

<script>

let estudiantes = [];

async function cargar() {
    const res = await fetch("estudiantes.json");
    estudiantes = await res.json();
    mostrar(estudiantes);
}

function mostrar(lista) {
    const cont = document.getElementById("resultados");

    cont.innerHTML = lista.map(e => `
        <div class="card">
            <h2>${e.nombreApellidos}</h2>

            <div class="item"><i class="fa fa-id-card icon"></i> ${e.cedula}</div>
            <div class="item"><i class="fa fa-users icon"></i> Sección: ${e.seccion}</div>
            <div class="item"><i class="fa fa-phone icon"></i> ${e.telefono}</div>

            <hr>

            <div class="item"><strong>Encargado:</strong> ${e.nombreEncargado}</div>
            <div class="item"><i class="fa fa-phone icon"></i> ${e.telefonoEncargado}</div>

            <hr>

            <div class="item">🍽️ Beca: <span class="badge ${e.tieneBecaComedor}">${e.tieneBecaComedor}</span></div>
            <div class="item">🚶 Permiso: <span class="badge ${e.tienePermisoSalirAlmorzar}">${e.tienePermisoSalirAlmorzar}</span></div>
            <div class="item">🚌 Transporte: <span class="badge ${e.transporte}">${e.transporte}</span></div>

            <hr>

            <div class="item">🩺 Salud: ${e.situacionSalud}</div>
            <div class="item ${e.accionCorrectiva ? 'alerta' : ''}">
                🚫 ${e.accionCorrectiva || "Sin restricciones"}
            </div>

        </div>
    `).join("");
}

document.getElementById("busqueda").addEventListener("input", function() {
    const t = this.value.toLowerCase();

    const filtrados = estudiantes.filter(e =>
        e.nombreApellidos.toLowerCase().includes(t) ||
        e.cedula.includes(t)
    );

    mostrar(filtrados);
});

cargar();

</script>

</body>
</html>
