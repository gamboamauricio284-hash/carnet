<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Búsqueda de estudiantes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    header {
      background: #0d47a1;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
    }

    .buscador {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .buscador label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .buscador input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 8px;
    }

    .resultado {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }

    .resultado h2 {
      margin-top: 0;
      color: #0d47a1;
    }

    .dato {
      margin: 6px 0;
      font-size: 16px;
    }

    .dato strong {
      color: #333;
    }

    .mensaje {
      background: #fff3cd;
      color: #856404;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ffeeba;
    }

    .contador {
      margin-bottom: 15px;
      font-weight: bold;
      color: #333;
    }

    @media (max-width: 600px) {
      main {
        padding: 12px;
      }

      .resultado, .buscador {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Búsqueda de estudiantes</h1>
    <p>Consulta de información estudiantil</p>
  </header>

  <main>
    <div class="buscador">
      <label for="busqueda">Buscar por nombre, apellidos o cédula:</label>
      <input
        type="text"
        id="busqueda"
        placeholder="Escriba un nombre, apellido o número de cédula"
      />
    </div>

    <div class="contador" id="contador"></div>
    <div id="resultados"></div>
  </main>

  <script>
    let estudiantes = [];

    async function cargarEstudiantes() {
      try {
        const respuesta = await fetch("estudiantes.json");
        estudiantes = await respuesta.json();
        mostrarResultados(estudiantes);
      } catch (error) {
        document.getElementById("resultados").innerHTML = `
          <div class="mensaje">
            No se pudo cargar el archivo <strong>estudiantes.json</strong>.
            Verifique que esté en el mismo repositorio y en la misma carpeta que <strong>index.html</strong>.
          </div>
        `;
      }
    }

    function mostrarResultados(lista) {
      const contenedor = document.getElementById("resultados");
      const contador = document.getElementById("contador");

      contador.textContent = `Resultados encontrados: ${lista.length}`;

      if (lista.length === 0) {
        contenedor.innerHTML = `
          <div class="mensaje">
            No se encontraron estudiantes con ese criterio de búsqueda.
          </div>
        `;
        return;
      }

      contenedor.innerHTML = lista.map(est => `
        <div class="resultado">
          <h2>${est.nombreApellidos}</h2>
          <div class="dato"><strong>Sección:</strong> ${est.seccion}</div>
          <div class="dato"><strong>Cédula:</strong> ${est.cedula}</div>
          <div class="dato"><strong>Teléfono:</strong> ${est.telefono}</div>
          <div class="dato"><strong>Nombre del encargado:</strong> ${est.nombreEncargado}</div>
          <div class="dato"><strong>Teléfono del encargado:</strong> ${est.telefonoEncargado}</div>
          <div class="dato"><strong>Tiene beca de comedor:</strong> ${est.tieneBecaComedor}</div>
          <div class="dato"><strong>Tiene permiso para salir a almorzar:</strong> ${est.tienePermisoSalirAlmorzar}</div>
          <div class="dato"><strong>Transporte:</strong> ${est.transporte}</div>
          <div class="dato"><strong>Alguna situación de salud:</strong> ${est.situacionSalud}</div>
          <div class="dato"><strong>Acción correctiva que le impida entrar al colegio:</strong> ${est.accionCorrectiva || "Ninguna"}</div>
        </div>
      `).join("");
    }

    document.getElementById("busqueda").addEventListener("input", function() {
      const texto = this.value.trim().toLowerCase();

      const filtrados = estudiantes.filter(est =>
        est.nombreApellidos.toLowerCase().includes(texto) ||
        est.cedula.toLowerCase().includes(texto)
      );

      mostrarResultados(filtrados);
    });

    cargarEstudiantes();
  </script>
</body>
</html>
