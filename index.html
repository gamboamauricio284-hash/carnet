<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Estudiantes</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body {
    font-family: Arial;
    background: #eef3f8;
    margin: 0;
}

header {
    background: #0d47a1;
    color: white;
    padding: 15px;
    display: flex;
    align-items: center;
    gap: 15px;
}

header img {
    height: 60px;
}

main {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.buscador {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 15px;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.card h2 {
    color: #0d47a1;
}

.item {
    margin: 8px 0;
}

.icon {
    margin-right: 6px;
    color: #0d47a1;
}

.badge {
    padding: 4px 10px;
    border-radius: 8px;
    color: white;
    font-size: 13px;
}

.si { background: green; }
.no { background: gray; }

.salud {
    background: #fff3cd;
    padding: 6px;
    border-radius: 6px;
}

.alerta {
    background: red;
    color: white;
    padding: 6px;
    border-radius: 6px;
    font-weight: bold;
}

.whatsapp {
    background: #25D366;
    color: white;
    padding: 5px 8px;
    border-radius: 6px;
    margin-left: 5px;
    text-decoration: none;
}

</style>
</head>

<body>

<header>
    <img src="escudo.png">
    <h1>Liceo de Tarrazú</h1>
</header>

<main>

<div class="buscador">
    <label><strong>Escribe el nombre o una parte del nombre para buscar:</strong></label>
    <input type="text" id="busqueda" placeholder="Ejemplo: Mora, María...">
</div>

<div class="grid" id="resultados"></div>

</main>

<script>

let estudiantes = [];

function telefonoCR(num){
    return "506" + num;
}

function whatsappLink(num, nombre){
    return `https://wa.me/${telefonoCR(num)}?text=Hola,%20le%20escribo%20del%20Liceo%20de%20Tarrazú%20por%20el%20estudiante%20${nombre}`;
}

async function cargar() {
    const res = await fetch("estudiantes.json");
    estudiantes = await res.json();
    mostrar(estudiantes);
}

function mostrar(lista) {
    const cont = document.getElementById("resultados");

    cont.innerHTML = lista.map(e => {

        let claseSalud = e.situacionSalud !== "no" ? "salud" : "";
        let claseAlerta = e.accionCorrectiva ? "alerta" : "";

        return `
        <div class="card">

            <h2>${e.nombreApellidos}</h2>

            <div class="item">
                <i class="fa fa-id-card icon"></i>
                ${e.cedula}
            </div>

            <div class="item">
                <i class="fa fa-users icon"></i>
                Sección: ${e.seccion}
            </div>

            <div class="item">
                <i class="fa fa-phone icon"></i>
                ${e.telefono}
                <a class="whatsapp" href="${whatsappLink(e.telefono, e.nombreApellidos)}" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                </a>
            </div>

            <hr>

            <div class="item"><strong>Encargado:</strong> ${e.nombreEncargado}</div>

            <div class="item">
                <i class="fa fa-phone icon"></i>
                ${e.telefonoEncargado}
                <a class="whatsapp" href="${whatsappLink(e.telefonoEncargado, e.nombreApellidos)}" target="_blank">
                    <i class="fab fa-whatsapp"></i>
                </a>
            </div>

            <hr>

            <div class="item">🍽️ Beca: <span class="badge ${e.tieneBecaComedor}">${e.tieneBecaComedor}</span></div>

            <div class="item">🚶 Permiso para salir a almorzar: 
                <span class="badge ${e.tienePermisoSalirAlmorzar}">${e.tienePermisoSalirAlmorzar}</span>
            </div>

            <div class="item">🚌 Transporte: 
                <span class="badge ${e.transporte}">${e.transporte}</span>
            </div>

            <hr>

            <div class="item ${claseSalud}">
                🩺 Alguna situación de salud: ${e.situacionSalud}
            </div>

            <div class="item ${claseAlerta}">
                🚫 ${e.accionCorrectiva || "Sin restricciones"}
            </div>

        </div>
        `;
    }).join("");
}

document.getElementById("busqueda").addEventListener("input", function() {
    const t = this.value.toLowerCase();

    const filtrados = estudiantes.filter(e =>
        e.nombreApellidos.toLowerCase().includes(t) ||
        e.cedula.includes(t)
    );

    mostrar(filtrados);
});

cargar();

</script>

</body>
</html>
